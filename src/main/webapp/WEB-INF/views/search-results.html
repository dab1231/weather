<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/resources/style.css}">
</head>
<body>

<nav class="navbar navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/home}">
            <img th:src="@{/resources/images/weather-app.png}" alt="" width="30" height="24" class="d-inline-block align-text-top">
            Weather Tracker
        </a>
        <div class="d-flex align-items-center">
            <form th:action="@{/user/sign-out}" method="post">
                <button class="btn btn-outline-danger">Sign out</button>
            </form>
        </div>
    </div>
</nav>

<section id="page-content">
    <div class="container mt-4">
        <div class="d-flex my-4">
            <form th:action="@{/home/search}" method="get" class="d-flex w-100">
                <div class="input-group location-search-input-group me-3">
                    <input class="form-control" type="text" name="cityName" placeholder="Enter location" required>
                </div>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>

        <div>
            <h2>Locations:</h2>
            <div class="row">
                <div class="col-12 col-lg-3 col-md-6 mb-4" th:each="city : ${citiesDto}">
                    <div class="card h-100">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title" th:text="${city.name}"></h5>
                            <p class="card-text mb-1" th:text="'Latitude: ' + ${city.lat}"></p>
                            <p class="card-text mb-1" th:text="'Longitude: ' + ${city.lon}"></p>
                            <p class="card-text mb-1" th:text="'Country: ' + ${city.country}"></p>
                            <p class="card-text mb-3" th:text="'State: ' + ${city.state}"></p>
                            <div class="mt-auto">
                                <form th:action="@{/home/search}" method="post">
                                    <input type="hidden" name="name" th:value="${city.name}">
                                    <input type="hidden" name="latitude" th:value="${city.lat}">
                                    <input type="hidden" name="longitude" th:value="${city.lon}">
                                    <button class="btn btn-primary w-100" type="submit">Add</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="d-flex flex-wrap justify-content-between align-items-center py-3 mt-4 border-top">
    <div class="px-4">
        <span>© Weather Viewer, project from <a href="https://zhukovsd.github.io/java-backend-learning-course/">zhukovsd/java-backend-learning-course</a> roadmap.</span>
    </div>
</footer>

</body>
</html>
